<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교통차단 계획 등록 - 인천국제공항고속도로</title>
    <link rel="stylesheet" href="styles.css?v=4">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-section-title {
            margin-bottom: 15px; 
            margin-top: 20px; 
            border-bottom: 2px solid #e1e5e9; 
            padding-bottom: 10px;
            color: #495057;
        }
        .form-section-title:first-child {
            margin-top: 0;
        }
        
        /* Make inputs look consistent with search */
        input[type="text"], input[type="date"], input[type="number"], input[type="tel"], input[type="time"], select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-plus-circle"></i> 교통차단 계획 등록</h1>
            <p>교통차단계획을 입력하세요</p>
        </header>

        <form id="registerForm" class="search-section" novalidate>
            <div class="search-container">
                <h3 class="form-section-title">기본 정보</h3>
                <div class="search-row">
                    <div class="search-field">
                        <label for="blockdate">차단일자 *</label>
                        <input type="date" id="blockdate" name="blockdate" required>
                    </div>
                    <div class="search-field">
                        <label for="const_name">공사명 *</label>
                        <input type="text" id="const_name" name="const_name" placeholder="예: 영종대교 보수공사" required>
                    </div>
                </div>
                <div class="search-row">
                    <div class="search-field">
                        <label for="direction">방향 *</label>
                        <select id="direction" name="direction" required>
                            <option value="">방향을 선택하세요</option>
                            <option value="인천방향">인천방향</option>
                            <option value="서울방향">서울방향</option>
                        </select>
                    </div>
                    <div class="search-field">
                        <label for="ieejung">위치 *</label>
                        <input type="text" id="ieejung" name="ieejung" placeholder="예: 10.5k" required>
                    </div>
                </div>

                <h3 class="form-section-title">차단 상세</h3>
                <div class="search-row">
                    <div class="search-field">
                        <label>차단시간 *</label>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <select id="chadan_start" name="chadan_start" required></select>
                            <span>~</span>
                            <select id="chadan_end" name="chadan_end" required></select>
                        </div>
                    </div>
                    <div class="search-field">
                        <label for="chadan">차단구간 *</label>
                        <input type="text" id="chadan" name="chadan" placeholder="예: 1, 2차로" required>
                    </div>
                </div>

                <h3 class="form-section-title">투입 현황</h3>
                <div class="search-row">
                    <div class="search-field">
                        <label for="workers">작업자 수</label>
                        <input type="number" id="workers" name="workers" min="0" placeholder="0">
                    </div>
                    <div class="search-field">
                        <label for="signcar">신호차 댓수</label>
                        <input type="number" id="signcar" name="signcar" min="0" placeholder="0">
                    </div>
                    <div class="search-field">
                        <label for="workcar">작업차 댓수</label>
                        <input type="number" id="workcar" name="workcar" min="0" placeholder="0">
                    </div>
                    <div class="search-field">
                        <label for="contractee">계약업체</label>
                        <input type="text" id="contractee" name="contractee" placeholder="예: 구보건설">
                    </div>
                </div>

                <h3 class="form-section-title">연락처 정보</h3>
                <div class="search-row">
                    <div class="search-field">
                        <label for="employee">담당자 *</label>
                        <input type="text" id="employee" name="employee" placeholder="이름" required>
                    </div>
                    <div class="search-field">
                        <label for="employeephone">담당자 연락처 *</label>
                        <input type="tel" id="employeephone" name="employeephone" placeholder="010-0000-0000" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" maxlength="13" required>
                    </div>
                </div>
                <div class="search-row">
                    <div class="search-field">
                        <label for="sitemanager">현장관리자</label>
                        <input type="text" id="sitemanager" name="sitemanager" placeholder="이름">
                    </div>
                    <div class="search-field">
                        <label for="smcellphone">관리자 연락처</label>
                        <input type="tel" id="smcellphone" name="smcellphone" placeholder="010-0000-0000" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" maxlength="13">
                    </div>
                </div>

                <div class="button-group" style="margin-top: 30px;">
                    <button type="submit" class="search-btn">
                        <i class="fas fa-save"></i>
                        저장하기
                    </button>
                    <button type="button" class="clear-btn" onclick="window.location.href='index.html'">
                        <i class="fas fa-list"></i>
                        목록으로 돌아가기
                    </button>
                </div>
            </div>
        </form>
    </div>

    <footer>
        <p>인천국제공항고속도로 교통차단 관리 시스템</p>
        <p>Made by 김현호</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseConfig.js"></script>
    <script src="register.js"></script>
</body>
</html>
